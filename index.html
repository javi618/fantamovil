<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fantástica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F0EBE0;
  --card: #FDFAF6;
  --header: #18140E;
  --accent: #C93910;
  --accent-bg: #FBE9E3;
  --text: #18140E;
  --t2: #6B6258;
  --t3: #A89E94;
  --border: rgba(24,20,14,0.10);
  --border2: rgba(24,20,14,0.22);
  --r: 20px;
  --rs: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --hh: 56px;
  --nh: 64px; /* bottom nav height */
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 14px;
  color: var(--text);
  overscroll-behavior: none;
}

/* ── HEADER ─────────────────────────────────────────────── */
.m-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  height: calc(var(--hh) + var(--safe-top));
  padding-top: var(--safe-top);
  background: var(--header);
  display: flex;
  align-items: center;
  padding-left: 16px;
  padding-right: 16px;
  gap: 12px;
}
.m-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}
.m-logo-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 7px 7px 7px 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.m-logo-text {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 300;
  color: #fff;
  letter-spacing: -0.02em;
}
.m-hbtn {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: rgba(255,255,255,0.8);
  flex-shrink: 0;
}
.m-hbtn svg { width: 18px; height: 18px; }
.m-user-av {
  width: 30px; height: 30px;
  border-radius: 9px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  cursor: pointer;
  flex-shrink: 0;
}

/* ── CARD STACK AREA ─────────────────────────────────────── */
.card-stage {
  position: fixed;
  top: calc(var(--hh) + var(--safe-top));
  bottom: calc(var(--nh) + var(--safe-bot));
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: var(--bg);
  padding: 12px 12px 8px;
}

/* ── POLL CARD ───────────────────────────────────────────── */
.poll-card {
  position: absolute;
  width: 100%;
  max-width: 420px;
  height: 100%;
  background: var(--card);
  border-radius: var(--r);
  box-shadow: 0 8px 32px rgba(24,20,14,0.12), 0 2px 8px rgba(24,20,14,0.06);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  touch-action: none;
  transition: transform 0.08s ease, box-shadow 0.08s ease;
  will-change: transform;
  cursor: grab;
  user-select: none;
}
.poll-card.is-dragging { cursor: grabbing; transition: none; }
.poll-card.exiting-left {
  transition: transform 0.4s cubic-bezier(.4,0,.2,1), opacity 0.4s;
  transform: translateX(-110%) rotate(-12deg) !important;
  opacity: 0;
}
.poll-card.exiting-right {
  transition: transform 0.4s cubic-bezier(.4,0,.2,1), opacity 0.4s;
  transform: translateX(110%) rotate(12deg) !important;
  opacity: 0;
}
.poll-card.next-card {
  transform: scale(0.94) translateY(12px);
  opacity: 0.7;
  pointer-events: none;
  transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s;
}
.poll-card.next-card.rising {
  transform: scale(1) translateY(0);
  opacity: 1;
}

/* Swipe direction indicators */
.swipe-hint {
  position: absolute;
  top: 20px;
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.02em;
  padding: 6px 14px;
  border-radius: 10px;
  border: 3px solid;
  opacity: 0;
  transition: opacity 0.1s;
  pointer-events: none;
  z-index: 10;
  text-transform: uppercase;
  font-size: 14px;
  font-weight: 600;
}
.swipe-hint.left { left: 16px; color: var(--accent); border-color: var(--accent); }
.swipe-hint.right { right: 16px; color: #0A6835; border-color: #0A6835; }

/* ── CARD CONTENT ────────────────────────────────────────── */
.card-top {
  padding: 18px 18px 12px;
  flex-shrink: 0;
}
.card-badges {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.badge {
  font-size: 10px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 99px;
}
.bg-pol { background: #E8F0FB; color: #1A3FA8; }
.bg-soc { background: #FCE8F3; color: #9E1060; }
.bg-eco { background: #E3F5EC; color: #0A6835; }
.bg-tec { background: #EDE8FC; color: #5528A8; }
.bg-dep { background: #FFF0E0; color: #934A00; }
.bg-rel { background: #FAE8EC; color: #C0405A; }
.bg-spon { background: #FDF8EC; color: #B8860B; border: 1px solid #E8D060; }
.sub-label {
  font-size: 10px;
  color: var(--t3);
  font-weight: 400;
}
.card-time-lbl { font-size: 10px; color: var(--t3); margin-left: auto; }

.card-q {
  font-family: 'Fraunces', serif;
  font-size: 21px;
  font-weight: 300;
  line-height: 1.35;
  color: var(--text);
  letter-spacing: -0.01em;
}

/* ── OPTIONS ─────────────────────────────────────────────── */
.card-opts {
  padding: 0 18px 12px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.opt {
  position: relative;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
  background: #fff;
}
.opt:active { transform: scale(0.98); }
.opt.sel {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}
.opt.win { border-color: var(--accent); }
.opt-bar {
  position: absolute;
  inset-y: 0; left: 0;
  background: var(--accent-bg);
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
.opt.sel .opt-bar { background: rgba(201,57,16,0.15); }
.opt-inner {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 13px;
  gap: 8px;
}
.opt-lbl {
  font-size: 13px;
  color: var(--text);
  line-height: 1.3;
}
.opt.sel .opt-lbl { color: var(--accent); font-weight: 500; }
.opt.sel .opt-lbl::before { content: '✓ '; font-weight: 700; }
.opt-pct {
  font-size: 11px;
  color: var(--t3);
  font-weight: 500;
  white-space: nowrap;
  flex-shrink: 0;
}
.opt.sel .opt-pct { color: var(--accent); font-weight: 600; }
.vote-hint {
  font-size: 11px;
  color: var(--t3);
  text-align: center;
  padding: 0 18px 10px;
  flex-shrink: 0;
}
.register-vote-hint {
  font-size: 12px;
  color: var(--t2);
  text-align: center;
  padding: 0 18px 10px;
  flex-shrink: 0;
}
.register-vote-hint span {
  color: var(--accent);
  font-weight: 500;
  cursor: pointer;
}

/* ── CARD FOOTER STATS ───────────────────────────────────── */
.card-stats {
  padding: 10px 18px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.card-stat {
  font-size: 11px;
  color: var(--t3);
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-stat svg { width: 12px; height: 12px; flex-shrink: 0; }

/* ── TOP COMMENT ─────────────────────────────────────────── */
.top-cmt {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 12px 18px 14px;
  border-top: 1px solid var(--border);
  -webkit-overflow-scrolling: touch;
}
.top-cmt-lbl {
  font-size: 9px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--t3);
  margin-bottom: 8px;
}
.cmt-row {
  display: flex;
  gap: 9px;
  align-items: flex-start;
}
.cmt-av {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.cmt-body { flex: 1; min-width: 0; }
.cmt-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
  flex-wrap: wrap;
}
.cmt-user { font-size: 11px; font-weight: 500; color: var(--text); }
.cmt-aff { font-size: 9px; font-weight: 600; }
.cmt-stance {
  font-size: 9px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 99px;
}
.cmt-likes { font-size: 10px; color: var(--t3); margin-left: auto; display: flex; align-items: center; gap: 3px; }
.cmt-txt { font-size: 12px; color: var(--t2); line-height: 1.5; }
.cmt-expand-btn {
  margin-top: 8px;
  font-size: 11px;
  color: var(--accent);
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── BOTTOM NAV ──────────────────────────────────────────── */
.m-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--nh) + var(--safe-bot));
  padding-bottom: var(--safe-bot);
  background: var(--header);
  display: flex;
  align-items: stretch;
  border-top: 1px solid rgba(255,255,255,0.06);
  z-index: 200;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  color: rgba(255,255,255,0.45);
  font-size: 10px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  background: none;
  border: none;
  transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
  padding-top: 6px;
}
.nav-btn.on { color: #fff; }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn.on svg path, .nav-btn.on svg circle, .nav-btn.on svg line, .nav-btn.on svg polyline { stroke: #fff; }

/* ── PROGRESS DOTS ───────────────────────────────────────── */
.progress-dots {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 5px;
  pointer-events: none;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(24,20,14,0.15);
  transition: all 0.3s;
}
.dot.on {
  background: var(--accent);
  width: 18px;
  border-radius: 3px;
}

/* ── SWIPE ARROWS (desktop hint) ─────────────────────────── */
.swipe-arrows {
  position: fixed;
  bottom: calc(var(--nh) + var(--safe-bot) + 16px);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 100;
  pointer-events: none;
}
.sw-arrow {
  width: 40px; height: 40px;
  background: rgba(24,20,14,0.06);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  pointer-events: all;
  cursor: pointer;
  transition: background 0.15s;
  color: var(--t2);
}
.sw-arrow:active { background: rgba(24,20,14,0.12); }

/* ── CATEGORY FILTER BAR ─────────────────────────────────── */
.cat-bar {
  position: fixed;
  top: calc(var(--hh) + var(--safe-top));
  left: 0; right: 0;
  height: 44px;
  background: var(--bg);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 14px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  z-index: 100;
  -webkit-overflow-scrolling: touch;
}
.cat-bar::-webkit-scrollbar { display: none; }
.cat-chip {
  font-size: 11px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--t2);
  white-space: nowrap;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
  flex-shrink: 0;
}
.cat-chip.on {
  background: var(--text);
  color: #fff;
  border-color: var(--text);
}

/* When cat bar is shown, offset stage */
.has-catbar .card-stage {
  top: calc(var(--hh) + var(--safe-top) + 44px);
}

/* ── DRAWER MENU ─────────────────────────────────────────── */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(24,20,14,0.5);
  z-index: 400;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.drawer-overlay.open { opacity: 1; pointer-events: all; }
.drawer {
  position: fixed;
  top: 0; right: 0;
  bottom: 0;
  width: 80%;
  max-width: 320px;
  background: var(--card);
  z-index: 500;
  transform: translateX(100%);
  transition: transform 0.32s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.drawer.open { transform: translateX(0); }
.drawer-header {
  background: var(--header);
  padding: 20px 20px 16px;
  padding-top: calc(20px + var(--safe-top));
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.drawer-title {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 300;
  color: #fff;
}
.drawer-close {
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.drawer-body { flex: 1; overflow-y: auto; padding: 16px; }
.drawer-section {
  margin-bottom: 20px;
}
.drawer-section-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--t3);
  margin-bottom: 8px;
  padding: 0 4px;
}
.drawer-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 12px;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.12s;
  text-decoration: none;
  color: var(--text);
}
.drawer-row:active { background: var(--bg); }
.drawer-row-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}
.drawer-row-text { flex: 1; }
.drawer-row-title { font-size: 14px; font-weight: 500; color: var(--text); }
.drawer-row-sub { font-size: 11px; color: var(--t3); margin-top: 1px; }
.drawer-row-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 99px;
  background: var(--accent-bg);
  color: var(--accent);
}

/* ── USER PANEL IN DRAWER ────────────────────────────────── */
.drawer-user {
  background: linear-gradient(135deg, var(--header) 0%, #2A2016 100%);
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.drawer-user-av {
  width: 48px; height: 48px;
  border-radius: 14px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.15);
}
.drawer-user-name { font-size: 15px; font-weight: 500; color: #fff; }
.drawer-user-level {
  font-size: 10px;
  color: rgba(255,255,255,0.6);
  margin-top: 2px;
}
.drawer-user-stats {
  display: flex;
  gap: 12px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.drawer-stat { text-align: center; }
.drawer-stat-n { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 300; color: #fff; }
.drawer-stat-l { font-size: 9px; color: rgba(255,255,255,0.5); margin-top: 1px; }

/* ── TRENDING SIDEBAR (in drawer) ─────────────────────────── */
.trend-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.12s;
}
.trend-item:active { background: var(--bg); }
.trend-n { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 300; color: var(--t3); min-width: 22px; }
.trend-q { font-size: 12px; color: var(--t2); line-height: 1.35; flex: 1; }
.trend-v { font-size: 10px; color: var(--t3); white-space: nowrap; }

/* ── USERS LIST (in drawer) ──────────────────────────────── */
.user-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.12s;
}
.user-item:active { background: var(--bg); }
.user-av {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 500; color: var(--text); }
.user-val { font-size: 11px; color: var(--t3); margin-top: 1px; }
.user-aff { font-size: 12px; font-weight: 600; }

/* ── MODAL: THREAD ───────────────────────────────────────── */
.thread-modal {
  position: fixed;
  inset: 0;
  z-index: 600;
  background: var(--bg);
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.thread-modal.open { transform: translateY(0); }
.thread-top {
  background: var(--header);
  padding: 12px 16px;
  padding-top: calc(12px + var(--safe-top));
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.thread-back {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 10px;
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.thread-back svg { width: 18px; height: 18px; }
.thread-title {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  font-weight: 300;
  color: #fff;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.thread-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  -webkit-overflow-scrolling: touch;
}
.thread-q-card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
  border: 1px solid var(--border);
}
.thread-q {
  font-family: 'Fraunces', serif;
  font-size: 17px;
  font-weight: 300;
  margin-bottom: 12px;
  line-height: 1.4;
}
.thread-cmt {
  background: var(--card);
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
}
.thread-cmt-header {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 6px;
}
.thread-cmt-av {
  width: 26px; height: 26px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}
.thread-composer {
  flex-shrink: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 10px 14px;
  padding-bottom: calc(10px + var(--safe-bot));
  display: flex;

/* ─────────────── AFFINITY ─────────────────────────────────── */
function affColor(pct) {
  if (pct >= 80) return '#1A7A1A';
  if (pct >= 65) return '#3A9A3A';
  if (pct >= 50) return '#B07800';
  if (pct >= 35) return '#C04020';
  if (pct >= 20) return '#A01818';
  return '#780808';
}

/* ─────────────── CARD RENDERING ───────────────────────────── */
function tot(p) { return p.votes.reduce((a,b) => a+b, 0); }

function buildCard(p, zIndex) {
  const total = tot(p);
  const winner = p.votes.indexOf(Math.max(...p.votes));
  const bk = badgeMap[p.cat] || 'bg-pol';
  const myVote = userVotes[p.id];
  const voted = myVote !== undefined;
  const top = p.cmts[0];
  const sc = SC[top.si] || SC[5];

  const card = document.createElement('div');
  card.className = 'poll-card';
  card.style.zIndex = zIndex;
  card.dataset.pollId = p.id;

  const optsHTML = p.opts.map((o, j) => {
    const pct = total > 0 ? Math.round(p.votes[j] / total * 100) : 0;
    const sel = myVote === j;
    return `<div class="opt${sel ? ' sel' : ''}${j === winner ? ' win' : ''}" data-opt="${j}" onclick="doVote(${p.id},${j},this)">
      <div class="opt-bar" style="width:${voted ? pct : 0}%"></div>
      <div class="opt-inner">
        <span class="opt-lbl">${o}</span>
        ${voted ? `<span class="opt-pct">${pct}%</span>` : ''}
      </div>
    </div>`;
  }).join('');

  card.innerHTML = `
    <div class="card-top">
      <div class="card-badges">
        <span class="badge ${bk}">${p.cat}</span>
        ${p.sub ? `<span class="sub-label">· ${p.sub}</span>` : ''}

        <span class="card-time-lbl">${timeAgo(p.createdAt)}</span>
      </div>
      <div class="card-q">${p.q}</div>
    </div>
    <div class="card-opts">${optsHTML}</div>
    ${loggedIn
      ? (!voted ? '<p class="vote-hint">Toca una opción para votar</p>' : '')
      : '<p class="register-vote-hint"><span onclick="openLogin()">Regístrate</span> para votar y ver resultados</p>'
    }
    <div class="card-stats">
      <span class="card-stat">

      <button onclick="openThread(${p.id})" style="margin-left:auto;font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;padding:0;">Ver hilo →</button>

        <div class="cmt-body">

            ${loggedIn && top.u !== 'javier_m' ? `<span class="cmt-aff" style="color:${affColor(getUserAff(top.u))};">${getUserAff(top.u)}%</span>` : ''}
            <span class="cmt-stance" style="background:${sc.bg};color:${sc.c};">${top.sl}</span>

}

function getUserAff(uid) {
  const u = usersData.find(x => x.uid === uid);
  return u ? u.affinity : 0;
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const h = Math.floor(diff / H);
  if (h < 1) return 'hace menos de 1h';
  if (h < 24) return `hace ${h}h`;
  return `hace ${Math.floor(h/24)} días`;
}

/* ─────────────── CARD STACK ────────────────────────────────── */
function renderStack() {
  filteredPolls = getFilteredPolls();
  const stage = document.getElementById('card-stage');
  // Remove old cards
  stage.querySelectorAll('.poll-card').forEach(c => c.remove());

  if (filteredPolls.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `<div class="empty-emoji">🗳️</div><div class="empty-title">Sin encuestas aquí</div><div class="empty-sub">Prueba otra categoría o vuelve más tarde</div><button class="empty-btn" onclick="setCat('all',null)">Ver todas</button>`;
    stage.appendChild(empty);
    renderDots();
    return;
  }

  // Show current + next (at most 2 cards)
  for (let i = Math.min(currentIndex + 1, filteredPolls.length - 1); i >= currentIndex; i--) {
    if (i >= filteredPolls.length) continue;
    const p = filteredPolls[i];
    const zIndex = i === currentIndex ? 10 : 5;
    const card = buildCard(p, zIndex);
    if (i !== currentIndex) {
      card.classList.add('next-card');
    }
    stage.appendChild(card);
  }

  // Wire touch/mouse events on top card
  const topCard = stage.querySelector('.poll-card:not(.next-card)');
  if (topCard) wireSwipe(topCard);

  renderDots();
}

function renderDots() {
  const dots = document.getElementById('progress-dots');
  dots.innerHTML = '';
  filteredPolls.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentIndex ? ' on' : '');
    dots.appendChild(d);
  });
}

/* ─────────────── SWIPE LOGIC ───────────────────────────────── */
function wireSwipe(card) {
  let startX = 0, startY = 0, currentX = 0, isDragging = false;
  const threshold = 80;

  function onStart(x, y) {
    startX = x; startY = y; currentX = 0; isDragging = true;
    card.classList.add('is-dragging');
  }

  function onMove(x, y) {
    if (!isDragging) return;
    const dx = x - startX;
    const dy = y - startY;
    // Prevent scroll if mostly horizontal
    if (Math.abs(dx) < Math.abs(dy) && Math.abs(dy) > 10) {
      isDragging = false;
      card.style.transform = '';
      return;
    }
    currentX = dx;
    const rot = dx * 0.06;
    card.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;

    // Show hints
    const progress = Math.min(Math.abs(dx) / threshold, 1);
    document.getElementById('hint-left').style.opacity = dx < -20 ? progress : 0;
    document.getElementById('hint-right').style.opacity = dx > 20 ? progress : 0;

    // Bring next card up
    const next = document.querySelector('.poll-card.next-card');
    if (next) {
      const scale = 0.94 + 0.06 * progress;
      const ty = 12 - 12 * progress;
      next.style.transform = `scale(${scale}) translateY(${ty}px)`;
      next.style.opacity = 0.7 + 0.3 * progress;
    }
  }

  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    card.classList.remove('is-dragging');
    document.getElementById('hint-left').style.opacity = 0;
    document.getElementById('hint-right').style.opacity = 0;

    if (currentX < -threshold) {
      // Swipe left → next
      navigate(1, card, 'exiting-left');
    } else if (currentX > threshold) {
      // Swipe right → prev
      navigate(-1, card, 'exiting-right');
    } else {
      // Snap back
      card.style.transition = 'transform 0.3s cubic-bezier(.4,0,.2,1)';
      card.style.transform = '';
      const next = document.querySelector('.poll-card.next-card');
      if (next) {
        next.style.transform = '';
        next.style.opacity = '';
      }
      setTimeout(() => { card.style.transition = ''; }, 300);
    }
  }

  // Touch events
  card.addEventListener('touchstart', e => {
    // Don't drag if touching opts or buttons
    if (e.target.closest('.opt, button, .top-cmt, .cmt-expand-btn')) return;
    onStart(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive: true});
  card.addEventListener('touchmove', e => {
    if (!isDragging) return;
    onMove(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive: true});
  card.addEventListener('touchend', onEnd);

  // Mouse events (desktop)
  card.addEventListener('mousedown', e => {
    if (e.target.closest('.opt, button, .top-cmt')) return;
    onStart(e.clientX, e.clientY);
  });
  window.addEventListener('mousemove', e => { if (isDragging) onMove(e.clientX, e.clientY); });
  window.addEventListener('mouseup', () => { if (isDragging) onEnd(); });
}

function navigate(dir, card, exitClass) {
  const newIndex = currentIndex + dir;
  if (newIndex < 0 || newIndex >= filteredPolls.length) {
    // Can't go further — snap back
    card.style.transition = 'transform 0.3s cubic-bezier(.4,0,.2,1)';
    card.style.transform = '';
    setTimeout(() => { card.style.transition = ''; }, 300);
    if (newIndex < 0) {
      showToast('Ya estás en la primera encuesta');
    } else {
      showToast('Has visto todas las encuestas 🎉');
    }
    return;
  }

  currentIndex = newIndex;

  card.classList.add(exitClass);
  card.addEventListener('transitionend', () => {
    renderStack();
  }, {once: true});
}

/* ─────────────── KEYBOARD / ARROW BUTTONS ─────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goNext();
  if (e.key === 'ArrowLeft') goPrev();
});

function goNext() {
  const card = document.querySelector('.poll-card:not(.next-card)');
  if (card) navigate(1, card, 'exiting-left');
}
function goPrev() {
  const card = document.querySelector('.poll-card:not(.next-card)');
  if (card) navigate(-1, card, 'exiting-right');
}

/* ─────────────── VOTING ────────────────────────────────────── */
function doVote(pid, opt, el) {
  if (!loggedIn) { openLogin(); return; }
  const p = polls.find(x => x.id === pid);
  if (!p) return;
  const prev = userVotes[pid];
  if (prev !== undefined) p.votes[prev] = Math.max(0, p.votes[prev] - 1);
  userVotes[pid] = opt;
  p.votes[opt]++;
  // Update the current card in place
  const card = document.querySelector(`.poll-card[data-poll-id="${pid}"]`);
  if (!card) return;
  const total = tot(p);
  const winner = p.votes.indexOf(Math.max(...p.votes));
  card.querySelectorAll('.opt').forEach((optEl, j) => {
    const pct = total > 0 ? Math.round(p.votes[j] / total * 100) : 0;
    const sel = j === opt;
    optEl.className = 'opt' + (sel ? ' sel' : '') + (j === winner ? ' win' : '');
    optEl.querySelector('.opt-bar').style.width = pct + '%';
    let inner = optEl.querySelector('.opt-inner');
    inner.innerHTML = `<span class="opt-lbl">${p.opts[j]}</span><span class="opt-pct">${pct}%</span>`;
  });
  // Remove vote hint, add voted state
  const hint = card.querySelector('.vote-hint');
  if (hint) hint.remove();
}

/* ─────────────── CATEGORY FILTER ──────────────────────────── */
function setCat(cat, btn) {
  activeCat = cat;
  currentIndex = 0;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('on'));
  if (btn) btn.classList.add('on');
  renderStack();
}

/* ─────────────── THREAD MODAL ──────────────────────────────── */
function openThread(pid) {
  const p = polls.find(x => x.id === pid);
  if (!p) return;
  currentThreadPoll = pid;
  document.getElementById('thread-title').textContent = p.q.substring(0, 50) + (p.q.length > 50 ? '…' : '');

  const total = tot(p);
  const winner = p.votes.indexOf(Math.max(...p.votes));
  const bk = badgeMap[p.cat] || 'bg-pol';
  const myVote = userVotes[pid];
  const voted = myVote !== undefined;

  const optsHTML = p.opts.map((o, j) => {
    const pct = total > 0 ? Math.round(p.votes[j] / total * 100) : 0;
    const sel = myVote === j;
    return `<div class="opt${sel ? ' sel' : ''}${j === winner ? ' win' : ''}" style="margin-bottom:6px;" onclick="doVote(${p.id},${j},this)">
      <div class="opt-bar" style="width:${voted ? pct : 0}%"></div>
      <div class="opt-inner">
        <span class="opt-lbl">${o}</span>
        ${voted ? `<span class="opt-pct">${pct}%</span>` : ''}
      </div>
    </div>`;
  }).join('');

  const cmtsHTML = p.cmts.map(c => {
    const sc = SC[c.si] || SC[5];
    return `<div class="thread-cmt">
      <div class="thread-cmt-header">
        <div class="thread-cmt-av" style="background:${c.ac};">${getEmoji(c.u)}</div>
        <span style="font-size:12px;font-weight:500;color:var(--text);">${c.u}</span>
        ${loggedIn && c.u !== 'javier_m' ? `<span style="font-size:9px;font-weight:600;color:${affColor(getUserAff(c.u))};">${getUserAff(c.u)}%</span>` : ''}
        <span class="cmt-stance" style="background:${sc.bg};color:${sc.c};">${c.sl}</span>
        <span style="font-size:10px;color:var(--t3);margin-left:auto;">♥ ${c.likes}</span>
      </div>
      <div style="font-size:13px;color:var(--t2);line-height:1.5;">${c.txt}</div>
      <div style="margin-top:8px;font-size:11px;color:var(--t3);">${c.time}</div>
    </div>`;
  }).join('');

  document.getElementById('thread-body').innerHTML = `
    <div class="thread-q-card">
      <div class="card-badges" style="margin-bottom:10px;">
        <span class="badge ${bk}">${p.cat}</span>
        ${p.sub ? `<span class="sub-label">· ${p.sub}</span>` : ''}
      </div>
      <div class="thread-q">${p.q}</div>
      ${optsHTML}
      ${!loggedIn ? `<p style="font-size:11px;color:var(--t2);text-align:center;margin-top:6px;"><span onclick="openLogin()" style="color:var(--accent);cursor:pointer;font-weight:500;">Regístrate</span> para votar</p>` : ''}
    </div>
    <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--t3);padding:0 2px;margin-bottom:8px;">${p.comments} comentarios</div>
    ${cmtsHTML}
  `;

  // Show composer only if logged in
  document.getElementById('thread-composer').style.display = loggedIn ? 'flex' : 'none';

  document.getElementById('thread-modal').classList.add('open');
}

function closeThread() {
  document.getElementById('thread-modal').classList.remove('open');
  currentThreadPoll = null;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function sendThreadComment() {
  const inp = document.getElementById('thread-input');
  const txt = inp.value.trim();
  if (!txt) return;
  const p = polls.find(x => x.id === currentThreadPoll);
  if (!p) return;
  const newCmt = {
    id: 'u_' + Date.now(),
    u: 'javier_m',
    ac: '#E8EFFC',
    si: userVotes[p.id] || 0,
    sl: p.opts[userVotes[p.id] || 0] || '',
    txt,
    likes: 0,
    time: 'ahora'
  };
  p.cmts.unshift(newCmt);
  p.comments++;
  inp.value = '';
  inp.style.height = '';
  openThread(currentThreadPoll);
  showToast('Comentario enviado ✓');
}

/* ─────────────── DRAWER ────────────────────────────────────── */
function openDrawer() {
  buildDrawer();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

function buildDrawer() {
  const body = document.getElementById('drawer-body');

  if (loggedIn) {
    body.innerHTML = `
      <div class="drawer-user">
        <div class="drawer-user-av">🧔🏻</div>
        <div style="flex:1;">
          <div class="drawer-user-name">javier_m</div>
          <div class="drawer-user-level"><span class="lv lv4">Nivel 4</span></div>
          <div class="drawer-user-stats">
            <div class="drawer-stat"><div class="drawer-stat-n">234</div><div class="drawer-stat-l">Votos</div></div>
            <div class="drawer-stat"><div class="drawer-stat-n">341</div><div class="drawer-stat-l">Comentarios</div></div>
            <div class="drawer-stat"><div class="drawer-stat-n">1.2k</div><div class="drawer-stat-l">Likes</div></div>
          </div>
        </div>
      </div>
      ${buildDrawerSections()}
      <div style="padding:8px 0;">
        <div class="drawer-row" onclick="doLogout()">
          <div class="drawer-row-icon">🚪</div>
          <div class="drawer-row-text"><div class="drawer-row-title" style="color:var(--accent);">Cerrar sesión</div></div>
        </div>
      </div>
    `;
  } else {
    body.innerHTML = `
      <div style="background:linear-gradient(135deg,var(--header) 0%,#2A2016 100%);border-radius:14px;padding:20px;margin-bottom:16px;text-align:center;">
        <div style="font-size:32px;margin-bottom:8px;">💬</div>
        <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:300;color:#fff;margin-bottom:4px;">Únete a Fantástica</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:14px;">Vota, comenta y conecta</div>
        <button onclick="closeDrawer();openLogin()" class="m-btn" style="font-size:13px;padding:11px;">Registrarse gratis</button>
        <p style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:10px;cursor:pointer;" onclick="closeDrawer();openLogin()">Ya tengo cuenta · Entrar</p>
      </div>
      ${buildDrawerSections()}
    `;
  }
}

function buildDrawerSections() {
  const trendingHTML = trendingPolls.map((t, i) => `
    <div class="trend-item" onclick="closeDrawer();jumpToPoll(${t.id})">
      <span class="trend-n">${i+1}</span>
      <span class="trend-q">${t.q}</span>
      <span class="trend-v">${t.votes}</span>
    </div>`).join('');

  const usersHTML = usersData.slice(0, 5).map(u => `
    <div class="user-item">
      <div class="user-av" style="background:#E8EFFC;">${getEmoji(u.uid)}</div>
      <div class="user-info">
        <div class="user-name">${u.uid}</div>
        <div class="user-val">${u.val}</div>
      </div>
      ${loggedIn
        ? `<span class="user-aff" style="color:${affColor(u.affinity)};">${u.affinity}%</span>`
        : `<span style="font-size:13px;color:var(--t3);cursor:pointer;" title="Inicia sesión para ver tu afinidad" onclick="openLogin()">?</span>`
      }
    </div>`).join('');

  return `
    <div class="drawer-section">
      <div class="drawer-section-title">Trending ahora</div>
      ${trendingHTML}
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">Usuarios destacados</div>
      ${usersHTML}
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">Más</div>
      <div class="drawer-row" onclick="closeDrawer();alert('Estadísticas — próximamente en la app')">
        <div class="drawer-row-icon">📊</div>
        <div class="drawer-row-text"><div class="drawer-row-title">Estadísticas</div><div class="drawer-row-sub">Datos en tiempo real</div></div>
      </div>
      <div class="drawer-row" onclick="closeDrawer();alert('Ayuda — próximamente')">
        <div class="drawer-row-icon">❓</div>
        <div class="drawer-row-text"><div class="drawer-row-title">Ayuda</div><div class="drawer-row-sub">FAQ y niveles</div></div>
      </div>
    </div>
  `;
}

function jumpToPoll(pid) {
  activeCat = 'all';
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('on'));
  document.querySelector('.cat-chip').classList.add('on');
  filteredPolls = getFilteredPolls();
  const idx = filteredPolls.findIndex(p => p.id === pid);
  if (idx >= 0) { currentIndex = idx; renderStack(); }
}

/* ─────────────── LOGIN ─────────────────────────────────────── */
function openLogin() {
  document.getElementById('login-sheet').classList.add('open');
  document.getElementById('login-overlay').classList.add('open');
}
function closeLogin() {
  document.getElementById('login-sheet').classList.remove('open');
  document.getElementById('login-overlay').classList.remove('open');
}
function setLoginTab(tab, btn) {
  loginTab = tab;
  document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('login-btn').textContent = tab === 'login' ? 'Entrar' : 'Crear cuenta';
}
function handleUserTap() {
  if (loggedIn) { openDrawer(); } else { openLogin(); }
}
function doLogin() {
  const email = document.getElementById('login-email').value;
  const pwd = document.getElementById('login-pwd').value;
  if (!email || pwd.length < 6) {
    showToast('Email y contraseña (mín. 6 caracteres) requeridos');
    return;
  }
  closeLogin();
  setLoggedIn();
}
function setLoggedIn() {
  loggedIn = true;
  userVotes = {1:0, 3:0, 4:2, 5:1};
  document.getElementById('m-user-av').textContent = '🧔🏻';
  document.getElementById('m-user-av').style.background = '#C93910';
  renderStack();
}
function doLogout() {
  loggedIn = false;
  userVotes = {};
  closeDrawer();
  document.getElementById('m-user-av').textContent = '🙂';
  document.getElementById('m-user-av').style.background = '';
  renderStack();
}

/* ─────────────── SEARCH (stub) ─────────────────────────────── */
function openSearch() {
  if (!loggedIn) {
    openLogin();
    return;
  }
  alert('Buscador de personas — próximamente en la app móvil');
}

/* ─────────────── BOTTOM NAV ────────────────────────────────── */
function navTo(section, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  if (section === 'feed') {
    // already there
  } else if (section === 'search') {
    openSearch();
    btn.classList.remove('on');
    document.querySelector('.nav-btn').classList.add('on');
  } else if (section === 'profile') {
    if (!loggedIn) { openLogin(); btn.classList.remove('on'); document.querySelector('.nav-btn').classList.add('on'); return; }
    openDrawer();
    btn.classList.remove('on');
    document.querySelector('.nav-btn').classList.add('on');
  } else if (section === 'stats') {
    alert('Estadísticas — próximamente en la app móvil');
    btn.classList.remove('on');
    document.querySelector('.nav-btn').classList.add('on');
  }
}

/* ─────────────── TOAST ─────────────────────────────────────── */
function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:calc(${getComputedStyle(document.documentElement).getPropertyValue('--nh')} + 16px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;z-index:9999;opacity:0;transition:opacity .25s;white-space:nowrap;max-width:90vw;text-align:center;`;
  document.body.appendChild(t);
  requestAnimationFrame(() => {
    t.style.opacity = '1';
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2200);
  });
}

/* ─────────────── INIT ──────────────────────────────────────── */
filteredPolls = getFilteredPolls();
renderStack();
